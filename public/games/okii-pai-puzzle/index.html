<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="配達員・逆襲のポチポチ — 通知を粉砕せよ。">
    <title>配達員・逆襲のポチポチ</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --surface2: #1e1e24;
            --border: #2a2a32;
            --accent: #00c853;
            --accent-dim: #00a844;
            --danger: #ff3d57;
            --warn: #ffb300;
            --text: #ececf1;
            --muted: #8b8b96;
            --phone-w: min(390px, 100vw - 24px);
        }

        body {
            min-height: 100dvh;
            background: #050507;
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text);
        }

        .phone {
            width: var(--phone-w);
            height: min(820px, 94dvh);
            background: var(--bg);
            border-radius: 36px;
            border: 3px solid #2c2c34;
            box-shadow: 0 0 0 1px #111, 0 24px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 120px; height: 28px; background: #000;
            border-radius: 0 0 18px 18px; z-index: 100;
        }

        .app-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background-color: #0d0d12;
        }

        /* ヒーロー画像 */
        .hero {
            position: relative;
            height: 110px;
            margin: 32px 12px 0;
            border-radius: 18px;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 10;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 40%;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(8,8,12,0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px 14px;
        }

        .hero-overlay h1 {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.8);
        }

        .hero-overlay .sub {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
        }

        .status-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            font-size: 0.72rem;
            color: var(--muted);
            z-index: 20;
        }

        .status-bar .time { font-weight: 600; color: var(--text); font-size: 0.85rem; }

        /* ステータスグリッド */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 12px 8px;
            z-index: 10;
        }

        .stat-card {
            background: rgba(22,22,26,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 12px;
        }

        .stat-card.wide {
            grid-column: 1 / -1;
        }

        .stat-label {
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.15rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.green { color: var(--accent); }
        .stat-value.blue  { color: #4fc3f7; }
        .stat-value.gold  { color: #ffd700; }
        .stat-value.red   { color: var(--danger); }
        .stat-value.warn  { color: var(--warn); }

        .stat-sub {
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 3px;
        }

        /* BANリスクゲージ */
        .ban-gauge {
            height: 5px;
            background: #222;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .ban-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.5s;
            width: 30%;
            background: var(--accent);
        }

        .ban-fill.warn  { background: var(--warn); }
        .ban-fill.danger { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

        /* 売上パネル */
        .sales-panel {
            margin: 0 12px 8px;
            padding: 10px 14px;
            background: rgba(22,22,26,0.9);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            text-align: center;
            z-index: 10;
        }

        .sales-item .label { font-size: 0.58rem; color: var(--muted); }
        .sales-item .val { font-size: 0.88rem; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
        .sales-item .val.plus { color: var(--accent); }
        .sales-item .val.minus { color: var(--danger); }
        .sales-item .val.net { color: #ffd700; }

        /* 粉砕数 */
        .score-panel {
            margin: 0 12px 8px;
            padding: 10px 14px;
            background: rgba(22,22,26,0.85);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .score-label { font-size: 0.72rem; color: var(--muted); }
        .score-value { font-size: 1.6rem; font-weight: 900; color: var(--accent); font-variant-numeric: tabular-nums; }
        .score-value.bump { animation: scoreBump 0.35s ease; }

        @keyframes scoreBump {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.2); color: #fff; }
            100% { transform: scale(1); }
        }

        .notification-zone {
            flex: 1;
            position: relative;
            margin: 0 12px;
            border-radius: 18px;
            overflow: hidden;
            background-image:
                linear-gradient(180deg, rgba(8,8,12,0.88) 0%, rgba(8,8,12,0.7) 100%),
                url('delivery-bg.png');
            background-size: cover;
            background-position: center;
        }

        .zone-hint {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); font-size: 0.78rem;
            pointer-events: none; opacity: 0.7;
            text-align: center; padding: 20px; line-height: 1.6; z-index: 0;
        }

        .card {
            position: absolute;
            min-width: 190px; max-width: 240px;
            padding: 12px 14px;
            background: rgba(30,30,36,0.95);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            z-index: 5;
            animation: cardPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .card:active { transform: scale(0.96); }
        .card.type-money { border-left: 3px solid var(--accent); }
        .card.type-pin   { border-left: 3px solid var(--danger); }
        .card.type-order { border-left: 3px solid var(--warn); }
        .card.type-msg   { border-left: 3px solid #7c4dff; }

        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.5) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-app { font-size: 0.62rem; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .card-app .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
        .card-title { font-size: 0.88rem; font-weight: 700; line-height: 1.35; }
        .card-time { font-size: 0.6rem; color: var(--muted); margin-top: 6px; text-align: right; }

        .card.destroying { pointer-events: none; animation: destroyCard 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
        @keyframes destroyCard {
            0%   { transform: scale(1) rotate(0deg); filter: brightness(1); }
            20%  { transform: scale(1.15) rotate(-3deg); filter: brightness(2); }
            100% { transform: scale(0) rotate(25deg); opacity: 0; }
        }

        .smash-text {
            position: absolute; font-size: 1.5rem; font-weight: 900; color: #fff;
            text-shadow: 0 0 10px #ff3d57, 0 0 30px #ff3d57;
            pointer-events: none; z-index: 50;
            animation: smashPop 0.6s ease forwards; white-space: nowrap;
        }

        @keyframes smashPop {
            0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            30%  { opacity: 1; transform: scale(1.3) rotate(5deg); }
            100% { opacity: 0; transform: scale(1.5) rotate(10deg) translateY(-30px); }
        }

        .particle {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            pointer-events: none; z-index: 49;
            animation: particleFly 0.5s ease forwards;
        }

        @keyframes particleFly {
            to { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .flash-overlay {
            position: absolute; inset: 0;
            background: rgba(255,61,87,0.15);
            pointer-events: none; z-index: 40;
            animation: flashFade 0.3s ease forwards;
        }

        @keyframes flashFade { from { opacity: 1; } to { opacity: 0; } }

        .toast {
            position: absolute;
            top: 8px; left: 50%; transform: translateX(-50%);
            padding: 6px 14px;
            background: rgba(255,61,87,0.9);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: 20px;
            z-index: 60;
            pointer-events: none;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
            white-space: nowrap;
        }

        @keyframes toastIn  { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
        @keyframes toastOut { to   { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

        .app-footer {
            padding: 12px 16px 24px;
            background: rgba(10,10,12,0.97);
            border-top: 1px solid var(--border);
            text-align: center;
            z-index: 10;
            flex-shrink: 0;
        }

        .app-footer p { font-size: 0.72rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }

        .invite-link {
            display: inline-block;
            padding: 11px 18px;
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            color: #000; font-size: 0.82rem; font-weight: 800;
            text-decoration: none; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,200,83,0.3);
        }

        .invite-link:active { transform: scale(0.97); }
        .home-bar { width: 100px; height: 4px; background: #444; border-radius: 2px; margin: 10px auto 0; }

        /* 音量パネル */
        .volume-panel {
            margin: 8px 12px 0;
            padding: 12px 14px;
            background: rgba(22,22,26,0.92);
            border: 1px solid var(--border);
            border-radius: 14px;
            z-index: 10;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .volume-panel.maxed {
            border-color: #ff3d57;
            box-shadow: 0 0 20px rgba(255,61,87,0.35), 0 0 40px rgba(255,215,0,0.15);
            animation: maxPulse 1.2s ease infinite;
        }

        @keyframes maxPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,61,87,0.35); }
            50%      { box-shadow: 0 0 30px rgba(255,61,87,0.6), 0 0 50px rgba(255,215,0,0.25); }
        }

        .volume-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .volume-header .label {
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 600;
        }

        .volume-header .status {
            font-size: 0.68rem;
            font-weight: 800;
            color: var(--accent);
            transition: color 0.3s;
        }

        .volume-panel.maxed .volume-header .status {
            color: #ff3d57;
            animation: textFlash 0.8s ease infinite;
        }

        @keyframes textFlash {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.6; }
        }

        .volume-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #222, #444);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #00e676);
            box-shadow: 0 2px 8px rgba(0,200,83,0.5);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .volume-panel.maxed .volume-slider::-webkit-slider-thumb {
            background: linear-gradient(135deg, #ff3d57, #ffd700);
            box-shadow: 0 0 16px rgba(255,61,87,0.8);
            transform: scale(1.15);
        }

        .volume-slider::-moz-range-thumb {
            width: 22px; height: 22px; border: none; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #00e676);
            cursor: pointer;
        }

        .volume-hint {
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 6px;
            text-align: center;
        }

        .volume-panel.maxed .volume-hint {
            color: #ff8a80;
            font-weight: 700;
        }

        .phone.max-vibe .notification-zone {
            box-shadow: inset 0 0 30px rgba(255,61,87,0.08);
        }
    </style>
</head>
<body>
    <div class="phone" id="phone">
        <div class="notch"></div>
        <div class="app-screen">
            <div class="status-bar">
                <span class="time" id="clock">--:--</span>
                <span>配達モード</span>
            </div>

            <div class="hero">
                <img src="delivery-bg.png" alt="夜の配達">
                <div class="hero-overlay">
                    <h1>配達員・逆襲のポチポチ</h1>
                    <p class="sub">通知を粉砕して生き残れ</p>
                </div>
            </div>

            <div class="volume-panel" id="volumePanel">
                <div class="volume-header">
                    <span class="label">🔊 ストレス解放ボリューム</span>
                    <span class="status" id="volumeStatus">静音</span>
                </div>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="0">
                <p class="volume-hint" id="volumeHint">上げるほど効果音がデカくなる。MAXで音楽が覚醒する</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">感謝率</div>
                    <div class="stat-value green" id="thanks">72%</div>
                    <div class="stat-sub" id="thanksSub">普通</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">応答率</div>
                    <div class="stat-value blue" id="response">94%</div>
                    <div class="stat-sub" id="responseSub">良好</div>
                </div>
                <div class="stat-card wide">
                    <div class="stat-label">アカウント停止リスク</div>
                    <div class="stat-value warn" id="banLabel">様子見</div>
                    <div class="ban-gauge"><div class="ban-fill" id="banFill"></div></div>
                    <div class="stat-sub" id="banSub">放置すると審査が来るぞ</div>
                </div>
            </div>

            <div class="sales-panel">
                <div class="sales-item">
                    <div class="label">売上</div>
                    <div class="val plus" id="gross">¥0</div>
                </div>
                <div class="sales-item">
                    <div class="label">手数料</div>
                    <div class="val minus" id="fee">-¥0</div>
                </div>
                <div class="sales-item">
                    <div class="label">受取額</div>
                    <div class="val net" id="net">¥0</div>
                </div>
            </div>

            <div class="score-panel">
                <span class="score-label">粉砕数</span>
                <span class="score-value" id="score">0</span>
            </div>

            <div class="notification-zone" id="zone">
                <p class="zone-hint" id="hint">通知が来るのを待て…<br>来たら容赦なく粉砕だ</p>
            </div>

            <footer class="app-footer">
                <p>同じ苦しみを分かち合う仲間を募集してるぜ。</p>
                <a class="invite-link"
                   href="https://www.uber.com/signup/drive/deliver/?invite_code=mwxmfvc"
                   target="_blank" rel="noopener noreferrer">＞＞ ここから一緒に稼ぐ ＜＜</a>
                <div class="home-bar"></div>
            </footer>
        </div>
    </div>

    <script>
        /* ===== オーディオエンジン ===== */
        const AudioEngine = {
            ctx: null,
            master: null,
            musicBus: null,
            sfxBus: null,
            volume: 0,
            step: 0,
            timer: null,
            layers: { pad: null, bass: null, hat: null, lead: null, chaos: null },
            layerGains: {},

            init() {
                if (this.ctx) return;
                const Ctx = window.AudioContext || window.webkitAudioContext;
                this.ctx = new Ctx();
                this.master = this.ctx.createGain();
                this.musicBus = this.ctx.createGain();
                this.sfxBus = this.ctx.createGain();
                this.compressor = this.ctx.createDynamicsCompressor();
                this.compressor.threshold.value = -12;
                this.compressor.ratio.value = 4;
                this.musicBus.connect(this.compressor);
                this.sfxBus.connect(this.compressor);
                this.compressor.connect(this.master);
                this.master.connect(this.ctx.destination);
                this._createMusicLayers();
                this.setVolume(this.volume);
                this._startSequencer();
            },

            async unlock() {
                if (!this.ctx) this.init();
                if (this.ctx.state === 'suspended') await this.ctx.resume();
            },

            _createMusicLayers() {
                const c = this.ctx;
                const freqs = [55, 82.41, 110];

                this.layers.pad = c.createOscillator();
                this.layers.pad.type = 'sawtooth';
                this.layers.pad.frequency.value = freqs[0];
                const padF = c.createBiquadFilter();
                padF.type = 'lowpass';
                padF.frequency.value = 280;
                this.layerGains.pad = c.createGain();
                this.layerGains.pad.gain.value = 0;
                this.layers.pad.connect(padF);
                padF.connect(this.layerGains.pad);
                this.layerGains.pad.connect(this.musicBus);
                this.layers.pad.start();

                this.layers.bass = c.createOscillator();
                this.layers.bass.type = 'square';
                this.layers.bass.frequency.value = freqs[0];
                const bassF = c.createBiquadFilter();
                bassF.type = 'lowpass';
                bassF.frequency.value = 200;
                this.layerGains.bass = c.createGain();
                this.layerGains.bass.gain.value = 0;
                this.layers.bass.connect(bassF);
                bassF.connect(this.layerGains.bass);
                this.layerGains.bass.connect(this.musicBus);
                this.layers.bass.start();

                this.layers.lead = c.createOscillator();
                this.layers.lead.type = 'triangle';
                this.layers.lead.frequency.value = 220;
                this.layerGains.lead = c.createGain();
                this.layerGains.lead.gain.value = 0;
                this.layers.lead.connect(this.layerGains.lead);
                this.layerGains.lead.connect(this.musicBus);
                this.layers.lead.start();

                this.layers.chaos = c.createOscillator();
                this.layers.chaos.type = 'sawtooth';
                this.layers.chaos.frequency.value = 440;
                const chaosF = c.createBiquadFilter();
                chaosF.type = 'bandpass';
                chaosF.frequency.value = 800;
                chaosF.Q.value = 8;
                this.layerGains.chaos = c.createGain();
                this.layerGains.chaos.gain.value = 0;
                this.layers.chaos.connect(chaosF);
                chaosF.connect(this.layerGains.chaos);
                this.layerGains.chaos.connect(this.musicBus);
                this.layers.chaos.start();
            },

            _startSequencer() {
                const tick = () => {
                    if (!this.ctx || this.volume <= 0) return;
                    const t = this.ctx.currentTime;
                    const v = this.volume / 100;
                    const maxed = this.volume >= 100;
                    const bpm = maxed ? 148 : v > 0.6 ? 118 : 92;
                    const beat = 60 / bpm / 2;

                    if (this.step % 2 === 0 && v > 0.15) {
                        this._pulseBass(t, maxed ? 0.35 * v : 0.2 * v);
                    }
                    if (this.step % 2 === 1 && v > 0.35) {
                        this.playHat(t, maxed ? 0.5 : 0.25);
                    }
                    if (this.step % 4 === 0 && v > 0.55) {
                        this._playLeadNote(t, maxed);
                    }
                    if (maxed && this.step % 3 === 0) {
                        this._chaosBlip(t);
                    }

                    this.step++;
                    this.timer = setTimeout(tick, beat * 1000);
                };
                tick();
            },

            _pulseBass(t, vol) {
                const g = this.layerGains.bass.gain;
                const notes = [55, 55, 73.42, 82.41, 55, 98, 82.41, 110];
                const freq = notes[this.step % notes.length];
                this.layers.bass.frequency.setValueAtTime(freq, t);
                g.cancelScheduledValues(t);
                g.setValueAtTime(vol * 0.5, t);
                g.exponentialRampToValueAtTime(0.001, t + 0.15);
            },

            _playLeadNote(t, maxed) {
                const scale = maxed
                    ? [220, 277.18, 329.63, 440, 523.25, 659.25, 440, 329.63]
                    : [220, 261.63, 329.63, 392, 329.63, 261.63];
                const freq = scale[this.step % scale.length];
                const g = this.layerGains.lead.gain;
                this.layers.lead.frequency.setValueAtTime(freq, t);
                g.cancelScheduledValues(t);
                g.setValueAtTime(maxed ? 0.22 : 0.1, t);
                g.exponentialRampToValueAtTime(0.001, t + (maxed ? 0.25 : 0.18));
            },

            _chaosBlip(t) {
                const g = this.layerGains.chaos.gain;
                this.layers.chaos.frequency.setValueAtTime(300 + Math.random() * 600, t);
                g.cancelScheduledValues(t);
                g.setValueAtTime(0.12, t);
                g.exponentialRampToValueAtTime(0.001, t + 0.08);
            },

            playHat(t, vol) {
                const c = this.ctx;
                const len = c.sampleRate * 0.04;
                const buf = c.createBuffer(1, len, c.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
                const src = c.createBufferSource();
                src.buffer = buf;
                const g = c.createGain();
                g.gain.value = vol;
                const f = c.createBiquadFilter();
                f.type = 'highpass';
                f.frequency.value = 8000;
                src.connect(f);
                f.connect(g);
                g.connect(this.musicBus);
                src.start(t);
            },

            setVolume(pct) {
                this.volume = pct;
                const v = pct / 100;
                const maxed = pct >= 100;

                if (this.ctx) {
                    this.master.gain.setTargetAtTime(Math.min(v * 1.1, 1), this.ctx.currentTime, 0.05);
                    this.musicBus.gain.setTargetAtTime(v * (maxed ? 0.85 : 0.55), this.ctx.currentTime, 0.05);
                    this.sfxBus.gain.setTargetAtTime(v * (maxed ? 1.6 : 1.2), this.ctx.currentTime, 0.05);

                    if (this.layerGains.pad) {
                        this.layerGains.pad.gain.setTargetAtTime(v > 0 ? 0.04 + v * 0.06 : 0, this.ctx.currentTime, 0.1);
                    }
                }

                const panel = document.getElementById('volumePanel');
                const phone = document.getElementById('phone');
                const status = document.getElementById('volumeStatus');
                const hint = document.getElementById('volumeHint');

                panel.classList.toggle('maxed', maxed);
                phone.classList.toggle('max-vibe', maxed);

                if (pct === 0) {
                    status.textContent = '静音';
                    hint.textContent = '上げるほど効果音がデカくなる。MAXで音楽が覚醒する';
                } else if (pct < 40) {
                    status.textContent = 'ちょい解放';
                    hint.textContent = 'もっと上げろ…ストレスが抜けていく';
                } else if (pct < 70) {
                    status.textContent = 'ストレス中';
                    hint.textContent = 'ビートが乗ってきた。粉砕が気持ちいい';
                } else if (pct < 100) {
                    status.textContent = '高火力';
                    hint.textContent = 'あと少し…MAXまで上げろ！';
                } else {
                    status.textContent = '🔥 MAX覚醒 🔥';
                    hint.textContent = '音楽フルパワー！ 容赦なく粉砕しろ！！';
                }
            },

            playSmash() {
                if (!this.ctx || this.volume <= 0) return;
                const c = this.ctx;
                const t = c.currentTime;
                const punch = this.volume >= 100 ? 1.8 : 1.0 + this.volume / 100;

                const osc = c.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, t);
                osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
                const g = c.createGain();
                g.gain.setValueAtTime(0.6 * punch, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.connect(g);
                g.connect(this.sfxBus);
                osc.start(t);
                osc.stop(t + 0.25);

                const len = c.sampleRate * 0.15;
                const buf = c.createBuffer(1, len, c.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
                const noise = c.createBufferSource();
                noise.buffer = buf;
                const ng = c.createGain();
                ng.gain.setValueAtTime(0.5 * punch, t);
                ng.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                noise.connect(ng);
                ng.connect(this.sfxBus);
                noise.start(t);

                if (this.volume >= 100) {
                    const o2 = c.createOscillator();
                    o2.type = 'square';
                    o2.frequency.setValueAtTime(880, t);
                    o2.frequency.exponentialRampToValueAtTime(110, t + 0.08);
                    const g2 = c.createGain();
                    g2.gain.setValueAtTime(0.25, t);
                    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    o2.connect(g2);
                    g2.connect(this.sfxBus);
                    o2.start(t);
                    o2.stop(t + 0.12);
                }
            },

            playSpawn() {
                if (!this.ctx || this.volume <= 0) return;
                const c = this.ctx;
                const t = c.currentTime;
                const vol = 0.15 + (this.volume / 100) * 0.35;
                const osc = c.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, t);
                osc.frequency.exponentialRampToValueAtTime(660, t + 0.08);
                const g = c.createGain();
                g.gain.setValueAtTime(vol, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc.connect(g);
                g.connect(this.sfxBus);
                osc.start(t);
                osc.stop(t + 0.12);
            },

            playMoney() {
                if (!this.ctx || this.volume <= 0) return;
                const c = this.ctx;
                const t = c.currentTime;
                const vol = 0.2 + (this.volume / 100) * 0.5;
                [1200, 1600].forEach((f, i) => {
                    const o = c.createOscillator();
                    o.type = 'sine';
                    o.frequency.value = f;
                    const g = c.createGain();
                    g.gain.setValueAtTime(0, t + i * 0.06);
                    g.gain.linearRampToValueAtTime(vol, t + i * 0.06 + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.2);
                    o.connect(g);
                    g.connect(this.sfxBus);
                    o.start(t + i * 0.06);
                    o.stop(t + i * 0.06 + 0.25);
                });
            },

            playWarning() {
                if (!this.ctx || this.volume <= 0) return;
                const c = this.ctx;
                const t = c.currentTime;
                const vol = 0.25 + (this.volume / 100) * 0.55;
                const o = c.createOscillator();
                o.type = 'square';
                o.frequency.setValueAtTime(200, t);
                o.frequency.setValueAtTime(280, t + 0.1);
                const g = c.createGain();
                g.gain.setValueAtTime(vol, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                o.connect(g);
                g.connect(this.sfxBus);
                o.start(t);
                o.stop(t + 0.3);
            },

            playMaxUnlock() {
                if (!this.ctx) return;
                const c = this.ctx;
                const t = c.currentTime;
                [440, 554, 659, 880].forEach((f, i) => {
                    const o = c.createOscillator();
                    o.type = 'triangle';
                    o.frequency.value = f;
                    const g = c.createGain();
                    g.gain.setValueAtTime(0, t + i * 0.08);
                    g.gain.linearRampToValueAtTime(0.35, t + i * 0.08 + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.4);
                    o.connect(g);
                    g.connect(this.sfxBus);
                    o.start(t + i * 0.08);
                    o.stop(t + i * 0.08 + 0.45);
                });
            }
        };

        const volumeSlider = document.getElementById('volumeSlider');
        let wasMaxed = false;

        volumeSlider.addEventListener('input', async (e) => {
            await AudioEngine.unlock();
            const val = parseInt(e.target.value, 10);
            AudioEngine.setVolume(val);
            if (val >= 100 && !wasMaxed) {
                wasMaxed = true;
                AudioEngine.playMaxUnlock();
                showToast('🔥 MAX覚醒！ 音楽フルパワー！');
            }
            if (val < 100) wasMaxed = false;
        });

        document.body.addEventListener('click', () => AudioEngine.unlock(), { once: true });

        const CARDS = [
            { type: 'money', app: '配達アプリ', title: '100円: 階段3階', earn: 100 },
            { type: 'money', app: '配達アプリ', title: '80円: エレベーターなし5階', earn: 80 },
            { type: 'money', app: '配達アプリ', title: '120円: 駐禁で停められない', earn: 120 },
            { type: 'money', app: '配達アプリ', title: '50円: 雨の中待機', earn: 50 },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: クソ客' },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: 建物が見つからない' },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: 川の真ん中' },
            { type: 'order', app: '新規注文',   title: '3km先・30分以内・雨' },
            { type: 'order', app: '新規注文',   title: 'チャイム鳴らすな・即配達' },
            { type: 'order', app: '新規注文',   title: '置き配禁止・玄関前待機' },
            { type: 'msg',   app: 'サポート',   title: '遅延報告をしてください' },
            { type: 'msg',   app: 'サポート',   title: '評価が下がりました' },
            { type: 'msg',   app: '店舗',       title: 'まだできてないのに来た？' },
            { type: 'money', app: '配達アプリ', title: '100円: 階段3階（また）', earn: 100 },
            { type: 'pin',   app: 'ナビ',       title: 'ピンズレ: クソ客（再送）' },
        ];

        const FEE_RATE = 0.28;
        const BAN_LEVELS = [
            { max: 20,  label: '安全圏',     sub: '今のところ余裕',     cls: '' },
            { max: 40,  label: '様子見',     sub: '放置すると審査が来るぞ', cls: '' },
            { max: 60,  label: '要注意',     sub: 'サポートが見てる',   cls: 'warn' },
            { max: 80,  label: '審査モード', sub: 'もう逃げられない',   cls: 'warn' },
            { max: 100, label: '凍結寸前',   sub: 'アカウントが震えてる', cls: 'danger' },
        ];

        const THANKS_LABELS = [
            [50, '危険'], [65, '低い'], [75, '普通'], [85, '好評'], [95, '神対応'], [101, '伝説']
        ];

        let smashCount = 0, activeCards = 0;
        let thanks = 72, response = 94, banRisk = 25;
        let grossSales = 0;
        const MAX_CARDS = 5;

        const zone = document.getElementById('zone');
        const scoreEl = document.getElementById('score');
        const hint = document.getElementById('hint');
        const els = {
            thanks: document.getElementById('thanks'),
            thanksSub: document.getElementById('thanksSub'),
            response: document.getElementById('response'),
            responseSub: document.getElementById('responseSub'),
            banLabel: document.getElementById('banLabel'),
            banFill: document.getElementById('banFill'),
            banSub: document.getElementById('banSub'),
            gross: document.getElementById('gross'),
            fee: document.getElementById('fee'),
            net: document.getElementById('net'),
        };

        function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
        function yen(n) { return '¥' + n.toLocaleString(); }

        function labelFor(val, table) {
            for (const [max, lbl] of table) if (val < max) return lbl;
            return table[table.length - 1][1];
        }

        function updateStats() {
            const fee = Math.round(grossSales * FEE_RATE);
            const net = grossSales - fee;

            els.thanks.textContent = thanks + '%';
            els.thanksSub.textContent = labelFor(thanks, THANKS_LABELS);
            els.response.textContent = response + '%';
            els.responseSub.textContent = response >= 90 ? '良好' : response >= 75 ? '微妙' : '危険';

            const ban = BAN_LEVELS.find(b => banRisk <= b.max) || BAN_LEVELS[BAN_LEVELS.length - 1];
            els.banLabel.textContent = ban.label;
            els.banLabel.className = 'stat-value ' + (ban.cls || 'warn');
            els.banSub.textContent = ban.sub;
            els.banFill.style.width = banRisk + '%';
            els.banFill.className = 'ban-fill ' + ban.cls;

            els.gross.textContent = yen(grossSales);
            els.fee.textContent = '-' + yen(fee);
            els.net.textContent = yen(net);
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('clock').textContent =
                `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
        }
        updateClock();
        setInterval(updateClock, 30000);

        function randomPos() {
            const pad = 6, cardW = 200, cardH = 80;
            const w = zone.clientWidth - cardW - pad * 2;
            const h = zone.clientHeight - cardH - pad * 2;
            return { left: pad + Math.random() * Math.max(w, 0), top: pad + Math.random() * Math.max(h, 0) };
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            zone.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function spawnParticles(x, y) {
            const colors = ['#ff3d57', '#ffb300', '#00c853', '#fff', '#7c4dff'];
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                p.style.background = pick(colors);
                const angle = (Math.PI * 2 * i) / 12;
                const dist = 40 + Math.random() * 60;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                zone.appendChild(p);
                setTimeout(() => p.remove(), 550);
            }
        }

        function onCardExpired() {
            banRisk = clamp(banRisk + 8, 0, 100);
            thanks = clamp(thanks - 3, 0, 100);
            response = clamp(response - 2, 0, 100);
            updateStats();
            if (banRisk >= 60) {
                showToast('⚠ 停止リスク上昇！');
                AudioEngine.playWarning();
            }
        }

        function smashCard(card, data) {
            if (card.classList.contains('destroying')) return;

            const rect = card.getBoundingClientRect();
            const zr = zone.getBoundingClientRect();
            const cx = rect.left - zr.left + rect.width / 2;
            const cy = rect.top - zr.top + rect.height / 2;

            card.classList.add('destroying');
            clearTimeout(card._expireTimer);

            const flash = document.createElement('div');
            flash.className = 'flash-overlay';
            zone.appendChild(flash);
            setTimeout(() => flash.remove(), 300);

            const txt = document.createElement('div');
            txt.className = 'smash-text';
            txt.textContent = '粉砕！';
            txt.style.left = (cx - 40) + 'px';
            txt.style.top = (cy - 20) + 'px';
            zone.appendChild(txt);
            setTimeout(() => txt.remove(), 600);

            spawnParticles(cx, cy);
            AudioEngine.playSmash();

            smashCount++;
            scoreEl.textContent = smashCount;
            scoreEl.classList.remove('bump');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('bump');

            thanks = clamp(thanks + (data.type === 'msg' ? 4 : 2), 0, 100);
            response = clamp(response + 1, 0, 100);
            banRisk = clamp(banRisk - 6, 0, 100);

            if (data.earn) {
                grossSales += data.earn;
                showToast(`+${data.earn}円 売上計上`);
                AudioEngine.playMoney();
            }

            if (data.type === 'pin') {
                thanks = clamp(thanks + 3, 0, 100);
                showToast('ピンズレ粉砕！ ストレス解消');
            }

            updateStats();
            activeCards--;
            hint.style.opacity = activeCards > 0 ? '0' : '0.7';
            setTimeout(() => card.remove(), 550);
        }

        function spawnCard() {
            if (activeCards >= MAX_CARDS) return;

            const data = pick(CARDS);
            const pos = randomPos();
            const card = document.createElement('div');
            card.className = `card type-${data.type}`;
            card.style.left = pos.left + 'px';
            card.style.top = pos.top + 'px';
            card.innerHTML = `
                <div class="card-app"><span class="dot"></span>${data.app}</div>
                <div class="card-title">${data.title}</div>
                <div class="card-time">たった今</div>
            `;

            card._expireTimer = setTimeout(() => {
                if (!card.classList.contains('destroying') && card.parentNode) {
                    onCardExpired();
                    card.remove();
                    activeCards--;
                    hint.style.opacity = activeCards > 0 ? '0' : '0.7';
                }
            }, 6000);

            card.addEventListener('click', () => smashCard(card, data));
            zone.appendChild(card);
            activeCards++;
            hint.style.opacity = '0';
            AudioEngine.playSpawn();

            banRisk = clamp(banRisk + 2, 0, 100);
            updateStats();
        }

        function scheduleSpawn() {
            setTimeout(() => { spawnCard(); scheduleSpawn(); }, 900 + Math.random() * 2000);
        }

        updateStats();
        scheduleSpawn();
        setTimeout(spawnCard, 500);
        setTimeout(spawnCard, 1100);

        setInterval(() => {
            response = clamp(response - 1 + Math.round(Math.random() * 2), 60, 100);
            if (activeCards >= 3) banRisk = clamp(banRisk + 1, 0, 100);
            updateStats();
        }, 5000);
    </script>
</body>
</html>
